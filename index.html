<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Basic Grammar in Use</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grammar Note">
<meta name="theme-color" content="#2D2D2D">
<style>
:root {
  --bg:        #f1efe8;
  --card:      #ffffff;
  --active:    #eae8e3;
  --blue:      #4B5B7C;
  --charcoal:  #2D2D2D;
  --orange:    #f0974a;
  --orange-dk: #ba7517;
  --orange-lt: #faeeda;
  --g1: #2c2c2a;
  --g2: #5f5e5a;
  --g3: #888780;
  --g4: #b4b2a9;
  --g5: #d3d1c7;
  --g6: #eae8e3;
  --font: 'Noto Sans KR', sans-serif;
  --r: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: var(--font); color: var(--g1); }

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

/* ── 헤더 (항상 고정) ── */
.hd {
  padding: 14px 16px 14px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 20;
  background: #2D2D2D;
}
.hd-main-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.hd-icon-wrap {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.hd-title { font-size: 16px; font-weight: 700; color: #ffffff; letter-spacing: -0.3px; }
.hd-sub   { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* 진도바 (항상 표시) */
.prog-wrap {
  margin: 0 0 12px;
  padding: 13px 16px;
  background: #2D2D2D;
  border-radius: var(--r);
}
.prog-bar  { height: 10px; background: rgba(255,255,255,0.25); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; background: #fff; transition: width 0.4s; }
.prog-meta { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: rgba(255,255,255,0.7); }
.prog-pct  { color: var(--orange); font-weight: 700; }

/* 유닛 상세 정보 바 */
.hd-unit-bar {
  padding: 10px 0 12px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.hd-back  { font-size: 13px; color: var(--orange); margin-bottom: 5px; cursor: pointer; display: block; text-align: right; }
.hd-unit-no  { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 500; }
.hd-unit-ttl { font-size: 16px; font-weight: 700; color: #ffffff; margin-top: 2px; }

/* ── 콘텐츠 ── */
.content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 80px;
}

/* ── 하단 네비 ── */
.nav {
  background: #2D2D2D;
  display: flex;
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 24px);
  max-width: 456px;
  border-radius: var(--r);
  border: none;
  box-shadow: 0 -2px 16px rgba(0,0,0,0.15);
  z-index: 20;
  overflow: hidden;
}
.nav-item { flex: 1; padding: 10px 4px 8px; text-align: center; cursor: pointer; }
.nav-item:active { opacity: 0.7; }
.nav-lbl { font-size: 10px; color: var(--g3); margin-top: 3px; font-weight: 700; }
.nav-item.on .nav-lbl { color: #ffffff; font-weight: 700; }

/* ── 유닛 목록 ── */
.unit-list { padding: 0 12px; display: flex; flex-direction: column; gap: 7px; }
.unit-card {
  background: var(--card);
  border-radius: var(--r);
  padding: 13px 14px;
  display: flex; align-items: center; gap: 11px;
  cursor: pointer;
  border: 1px solid var(--g5);
  transition: transform 0.12s;
}
.unit-card:active { transform: scale(0.98); }

.unit-card.done-card { opacity: 0.68; }
.chk {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--g4); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
}
.chk.done { background: var(--orange); border-color: var(--orange); }
.chk.done::after {
  content: ''; width: 8px; height: 5px;
  border-left: 2px solid #fff; border-bottom: 2px solid #fff;
  transform: rotate(-45deg) translateY(-1px); display: block;
}
.unit-info { flex: 1; min-width: 0; }
.unit-nm   { font-size: 13px; font-weight: 500; color: var(--g1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.unit-meta { font-size: 11px; color: var(--g3); margin-top: 2px; }
.unit-meta.ing { color: var(--g2); font-weight: 500; }
.unit-arr  { font-size: 16px; color: var(--g4); flex-shrink: 0; }
.add-unit-row {
  margin: 7px 12px 6px;
  padding: 14px;
  border-radius: var(--r);
  background: #2D2D2D;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 14px; font-weight: 700; color: #fff;
  cursor: pointer;
  transition: opacity 0.15s;
}
.add-unit-row:active { opacity: 0.8; }
.page-nav { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 10px 12px 14px; }
.page-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--g4); font-size: 13px; color: var(--g2); background: var(--card); cursor: pointer; font-family: var(--font); }
.page-btn:disabled { opacity: 0.35; cursor: default; }
.page-info { font-size: 12px; color: var(--g3); }

/* ── 노트 본문 ── */
.nb { padding: 0 15px 15px; }
.unit-title-box {
  background: var(--card); border: 1px solid var(--g5);
  border-radius: var(--r); padding: 13px 14px; margin-bottom: 14px;
}
.unit-title-no { font-size: 11px; color: var(--g3); font-weight: 500; letter-spacing: 0.4px; }
.unit-title-nm { font-size: 17px; font-weight: 700; color: var(--g1); margin-top: 3px; letter-spacing: -0.3px; }
.sec-lbl { font-size: 14px; font-weight: 700; color: #000000; letter-spacing: 0px; text-transform: none; margin-bottom: 8px; margin-top: 18px; }
.sec-lbl:first-child { margin-top: 0; }
.grammar-ta {
  width: 100%; background: var(--card);
  border-radius: 8px; padding: 12px 13px;
  font-size: 14px; color: var(--g1); line-height: 1.75;
  border: 1px solid var(--g5); font-family: var(--font);
  resize: none; outline: none; min-height: 110px;
}
.grammar-ta:focus { border-color: #2D2D2D; }

/* ── 예문 카드 ── */
.ex-card {
  background: var(--card); border: 1px solid var(--g5);
  border-radius: 8px; padding: 12px 13px;
  margin-bottom: 7px; position: relative;
}
.ex-en  { font-size: 14px; font-weight: 500; color: var(--g1); line-height: 1.5; padding-right: 22px; }
.ex-kr  { font-size: 12px; color: var(--g2); margin-top: 3px; }
.ex-del { position: absolute; top: 10px; right: 11px; font-size: 17px; color: var(--g4); cursor: pointer; }
.ex-inp {
  border: 1px solid var(--g5); border-radius: 6px;
  padding: 9px 11px; font-size: 14px; font-family: var(--font);
  color: var(--g1); background: var(--bg); outline: none; width: 100%;
}
.ex-inp:focus { border-color: #2D2D2D; }
.ex-form-btns { display: flex; gap: 8px; }
.btn-cancel {
  flex: 1; padding: 9px; border-radius: 7px;
  border: 1px solid var(--g4); font-size: 13px; color: var(--g2);
  background: none; cursor: pointer; font-family: var(--font);
}
.btn-save {
  flex: 1; padding: 9px; border-radius: 7px;
  border: none; font-size: 13px; color: #fff;
  background: #2D2D2D; cursor: pointer; font-weight: 500; font-family: var(--font);
}
.add-ex-btn {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 11px; border: 1.5px dashed var(--g4); border-radius: 8px;
  font-size: 13px; color: var(--g3); cursor: pointer; margin-bottom: 7px;
}
.add-ex-btn:active { background: var(--g6); }

/* ── 완료 버튼 ── */
.done-cta {
  width: 100%; padding: 14px; border-radius: 8px;
  border: none; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: var(--font);
}
.done-cta.mark   { background: #2D2D2D; color: #fff; }
.done-cta.unmark { background: var(--g6); color: var(--g2); border: 1px solid var(--g5); }

/* ── 복습 ── */
.rv-wrap { padding: 13px; display: flex; flex-direction: column; gap: 12px; }
.filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  padding: 5px 12px; border-radius: 99px; border: 1px solid var(--g4);
  font-size: 12px; color: var(--g2); cursor: pointer; white-space: nowrap;
  background: var(--card);
}
.chip.on { background: #2D2D2D; border-color: #2D2D2D; color: #fff; font-weight: 500; }
.rv-count { text-align: center; font-size: 12px; color: var(--g3); }
.flash-card {
  background: var(--card); border: 1px solid var(--g5);
  border-radius: var(--r); padding: 30px 18px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  cursor: pointer; min-height: 170px; transition: transform 0.12s;
}
.flash-card:active { transform: scale(0.98); }
.flash-en   { font-size: 16px; font-weight: 700; color: var(--g1); line-height: 1.55; }
.flash-div  { height: 1px; background: var(--g5); width: 32px; }
.flash-kr   { font-size: 14px; color: var(--g2); }
.flash-hint { font-size: 11px; color: var(--g3); }
.flash-tap  { font-size: 12px; color: var(--g4); }
.rv-btns { display: flex; gap: 9px; }
.rv-skip {
  flex: 1; padding: 12px; border-radius: 8px;
  border: 1px solid var(--g4); font-size: 14px; color: var(--g2);
  background: var(--card); cursor: pointer; font-family: var(--font);
}
.rv-ok {
  flex: 1; padding: 12px; border-radius: 8px;
  border: none; font-size: 14px; color: #fff;
  background: #2D2D2D; cursor: pointer; font-weight: 700; font-family: var(--font);
}
.rv-stat-row { display: flex; gap: 7px; }
.rv-stat {
  flex: 1; background: var(--card); border: 1px solid var(--g5);
  border-radius: 8px; padding: 11px 8px; text-align: center;
}
.rv-stat-n { font-size: 20px; font-weight: 700; color: var(--g1); }
.rv-stat-l { font-size: 11px; color: var(--g3); margin-top: 2px; }
.rv-empty  { text-align: center; padding: 44px 20px; color: var(--g3); font-size: 14px; line-height: 1.85; }

/* ── 통계 ── */
.st-wrap { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.st-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.st-card {
  background: var(--card); border: 1px solid var(--g5);
  border-radius: var(--r); padding: 15px 13px; text-align: center;
}
.st-n { font-size: 30px; font-weight: 700; color: var(--g1); letter-spacing: -1px; }
.st-n.accent { color: #2D2D2D; }
.st-l { font-size: 12px; color: var(--g3); margin-top: 3px; }
.st-prog-wrap {
  background: var(--card); border: 1px solid var(--g5);
  border-radius: var(--r); padding: 15px 13px;
}
.st-prog-lbl { font-size: 13px; font-weight: 500; color: var(--g1); margin-bottom: 9px; }
.st-prog-bar { height: 5px; background: var(--g5); border-radius: 99px; overflow: hidden; }
.st-prog-fill { height: 100%; border-radius: 99px; background: #2D2D2D; }

/* ── 설정 ── */
.sv-wrap { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.sv-sec-lbl { font-size: 11px; font-weight: 700; color: var(--g3); letter-spacing: 0.5px; text-transform: uppercase; padding: 0 3px; }
.sv-sec { background: var(--card); border: 1px solid var(--g5); border-radius: var(--r); overflow: hidden; }
.sv-row {
  display: flex; align-items: center; gap: 11px;
  padding: 13px 14px; border-bottom: 1px solid var(--g5);
  cursor: pointer;
}
.sv-row:last-child { border-bottom: none; }
.sv-row:active { background: var(--g6); }
.sv-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--g6); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sv-txt { flex: 1; }
.sv-nm   { font-size: 14px; color: var(--g1); font-weight: 500; }
.sv-desc { font-size: 11px; color: var(--g3); margin-top: 2px; }
.sv-arr  { font-size: 15px; color: var(--g4); }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 99px; font-weight: 500; }
.badge-on  { background: #e1f5ee; color: #0f6e56; }
.badge-off { background: var(--g6); color: var(--g3); }

/* ── 모달 ── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 100; display: flex; align-items: flex-end; justify-content: center;
}
.ctx-menu {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 100; display: flex; align-items: flex-end; justify-content: center;
}
.ctx-sheet {
  background: var(--card); border-radius: 18px 18px 0 0;
  padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
  width: 100%; max-width: 480px;
  display: flex; flex-direction: column; gap: 8px;
  animation: slideUp 0.2s ease;
}
.ctx-title { font-size: 13px; color: var(--g3); text-align: center; padding-bottom: 8px; border-bottom: 1px solid var(--g5); margin-bottom: 4px; }
.ctx-btn {
  width: 100%; padding: 14px; border-radius: 10px;
  border: none; font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: var(--font); text-align: center;
  background: var(--g6); color: var(--g1);
}
.ctx-btn.danger { background: #fff0f0; color: #c0392b; }
.ctx-btn:active { opacity: 0.8; }
.ctx-cancel { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 15px; color: var(--g2); background: var(--card); cursor: pointer; font-family: var(--font); border: 1px solid var(--g5); }
.modal {
  background: var(--card); border-radius: 18px 18px 0 0;
  padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
  width: 100%; max-width: 480px;
  display: flex; flex-direction: column; gap: 13px;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 34px; height: 4px; background: var(--g5); border-radius: 99px; margin: 0 auto -4px; }
.modal-ttl  { font-size: 16px; font-weight: 700; color: var(--g1); }
.modal-inp  {
  border: 1px solid var(--g5); border-radius: 8px;
  padding: 12px 13px; font-size: 15px; font-family: var(--font);
  color: var(--g1); background: var(--bg); outline: none; width: 100%;
}
.modal-inp:focus { border-color: #2D2D2D; }
.modal-btns { display: flex; gap: 9px; }
.modal-cancel {
  flex: 1; padding: 12px; border-radius: 8px;
  border: 1px solid var(--g4); font-size: 15px; color: var(--g2);
  background: none; cursor: pointer; font-family: var(--font);
}
.modal-ok {
  flex: 1; padding: 12px; border-radius: 8px;
  border: none; font-size: 15px; color: #fff;
  background: #2D2D2D; cursor: pointer; font-weight: 700; font-family: var(--font);
}

/* ── 토스트 ── */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--g1); color: #f5f4f1;
  font-size: 13px; font-weight: 500;
  padding: 10px 18px; border-radius: 99px;
  opacity: 0; transition: opacity 0.25s; pointer-events: none;
  white-space: nowrap; z-index: 200;
}
.toast.show { opacity: 1; }
.hidden { display: none !important; }

/* ── 온보딩 ── */
.ob-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 300; display: flex; align-items: flex-end; justify-content: center;
}
.ob-sheet {
  background: var(--card); border-radius: 20px 20px 0 0;
  padding: 28px 24px calc(32px + env(safe-area-inset-bottom));
  width: 100%; max-width: 480px;
  display: flex; flex-direction: column; align-items: center; gap: 18px;
  animation: slideUp 0.25s ease;
}
.ob-icon { width: 64px; height: 64px; border-radius: 16px; background: #2D2D2D; display: flex; align-items: center; justify-content: center; }
.ob-step { font-size: 11px; font-weight: 700; color: var(--g3); letter-spacing: 0.5px; text-transform: uppercase; }
.ob-title { font-size: 20px; font-weight: 700; color: var(--g1); text-align: center; letter-spacing: -0.3px; }
.ob-desc { font-size: 14px; color: var(--g2); text-align: center; line-height: 1.75; }
.ob-dots { display: flex; gap: 7px; }
.ob-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--g5); }
.ob-dot.on { background: #2D2D2D; }
.ob-btn {
  width: 100%; padding: 14px; border-radius: 10px;
  border: none; font-size: 15px; font-weight: 700; color: #fff;
  background: #2D2D2D; cursor: pointer; font-family: var(--font);
}
</style>
</head>
<body>
<div class="app">

  <div class="hd" id="hd">
    <div class="hd-main-row" onclick="navigate('units')" style="cursor:pointer">
      <div class="hd-icon-wrap">
        <svg width="28" height="28" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <rect width="512" height="512" rx="110" fill="rgba(255,255,255,0.1)"/>
          <rect x="60" y="148" width="148" height="118" rx="28" fill="rgba(255,255,255,0.92)"/>
          <text x="134" y="232" text-anchor="middle" font-size="82" font-weight="700" fill="#2D2D2D" font-family="Arial,sans-serif">A</text>
          <rect x="220" y="148" width="112" height="118" rx="28" fill="rgba(255,255,255,0.45)"/>
          <text x="276" y="232" text-anchor="middle" font-size="82" font-weight="700" fill="#ffffff" font-family="Arial,sans-serif">B</text>
          <rect x="344" y="148" width="108" height="118" rx="28" fill="rgba(255,255,255,0.18)"/>
          <text x="398" y="232" text-anchor="middle" font-size="82" font-weight="700" fill="rgba(255,255,255,0.5)" font-family="Arial,sans-serif">C</text>
          <rect x="60" y="290" width="248" height="90" rx="24" fill="#f0974a"/>
          <text x="184" y="348" text-anchor="middle" font-size="36" font-weight="700" fill="#ffffff" font-family="Arial,sans-serif">space</text>
          <rect x="322" y="290" width="64" height="90" rx="24" fill="rgba(255,255,255,0.18)"/>
          <rect x="398" y="290" width="54" height="90" rx="24" fill="rgba(255,255,255,0.18)"/>
        </svg>
      </div>
      <div>
        <div class="hd-title">Basic Grammar in Use</div>
        <div class="hd-sub">나의 문법 노트</div>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-meta">
        <span id="prog-text">0 / 0 units 완료</span>
        <span class="prog-pct" id="prog-pct">0%</span>
      </div>
    </div>
    <div class="hd-unit-bar hidden" id="hd-unit-bar">
      <div class="hd-back" onclick="goBack()">‹ 목록으로</div>
    </div>
  </div>

  <div class="content" id="content"></div>

  <nav class="nav">
    <div class="nav-item on" id="nav-units" onclick="navigate('units')">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="4" width="14" height="2" rx="1" id="ni1a" fill="#888780"/>
        <rect x="3" y="9" width="14" height="2" rx="1" id="ni1b" fill="#888780"/>
        <rect x="3" y="14" width="9" height="2" rx="1" id="ni1c" fill="#888780"/>
      </svg>
      <div class="nav-lbl" id="nl-units">유닛</div>
    </div>
    <div class="nav-item" id="nav-review" onclick="navigate('review')">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">

<script>
const CLIENT_ID = '494883038886-9rvmh42uk2m5qbquusqahfroreidaej7.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/drive.appdata';
const FILE_NAME = 'grammar-note-data.json';
const ORANGE    = '#f0974a', GRAY = '#888780', BLUE = '#4B5B7C';

let tokenClient = null;
let accessToken = null;

let S = {
  screen: 'units', unit: null, tab: 'note',
  units: [], rvIdx: 0, rvFilter: 'all', rvRevealed: false,
  rvMem: {}, gapiReady: false, driveOn: false, driveFileId: null
};

function loadLocal() {
  try {
    // 이전 키(gn-data)에서 마이그레이션
    const old = localStorage.getItem('gn-data');
    if (old) {
      const p = JSON.parse(old);
      S.units = p.units||[]; S.rvMem = p.rvMem||{}; S.driveFileId = p.driveFileId||null;
      localStorage.setItem('gn2', JSON.stringify({ units: S.units, rvMem: S.rvMem, driveFileId: S.driveFileId }));
      localStorage.removeItem('gn-data');
      return;
    }
    const d = localStorage.getItem('gn2');
    if (d) { const p = JSON.parse(d); S.units = p.units||[]; S.rvMem = p.rvMem||{}; S.driveFileId = p.driveFileId||null; }
  } catch(e) {}
}
function save() {
  localStorage.setItem('gn2', JSON.stringify({ units: S.units, rvMem: S.rvMem, driveFileId: S.driveFileId }));
  if (S.driveOn) saveToDrive();
}
function saveScreen() {
  sessionStorage.setItem('gn-screen', JSON.stringify({ screen: S.screen, unit: S.unit, unitPage: S.unitPage||0 }));
}
function loadScreen() {
  try {
    const d = sessionStorage.getItem('gn-screen');
    if (d) { const p = JSON.parse(d); S.screen = p.screen||'units'; S.unit = p.unit; S.unitPage = p.unitPage||0; }
  } catch(e) {}
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function navigate(scr) {
  S.screen = scr; S.unit = null; S.tab = 'note';
  document.getElementById('hd-unit-bar').classList.add('hidden');
  updateNav(scr); render(); saveScreen();
}
function updateNav(active) {
  ['units','review','stats','settings'].forEach(id => {
    document.getElementById('nav-' + id).classList.toggle('on', id === active);
    document.getElementById('nl-' + id).style.color = id === active ? '#ffffff' : GRAY;
  });
  const map = {
    units:    [['ni1a','fill'],['ni1b','fill'],['ni1c','fill']],
    review:   [['ni2a','stroke'],['ni2b','fill'],['ni2c','fill']],
    stats:    [['ni3a','fill'],['ni3b','fill'],['ni3c','fill']],
    settings: [['ni4a','stroke'],['ni4b','stroke']]
  };
  Object.entries(map).forEach(([id, els]) => els.forEach(([eid, attr]) => {
    const el = document.getElementById(eid);
    if (el) el.setAttribute(attr, id === active ? '#ffffff' : GRAY);
  }));
}
function openUnit(i) {
  S.unit = i; S.tab = 'note'; S.screen = 'unit-detail';
  document.getElementById('hd-unit-bar').classList.remove('hidden');
  render(); saveScreen();
}
function goBack() {
  S.screen = 'units'; S.unit = null;
  document.getElementById('hd-unit-bar').classList.add('hidden');
  render(); saveScreen();
}
function switchTab(t) { S.tab = t; updateTabBar(); render(); }
function updateTabBar() {
  ['note','examples','done'].forEach(t =>
    document.getElementById('tab-' + t).classList.toggle('on', t === S.tab));
}

function updateProgress() {
  const total = S.units.length;
  const done  = S.units.filter(u => u.done).length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  const fill = document.getElementById('prog-fill');
  const text = document.getElementById('prog-text');
  const pctEl = document.getElementById('prog-pct');
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = done + ' / ' + total + ' units 완료';
  if (pctEl) pctEl.textContent = pct + '%';
}
function render() {
  const c = document.getElementById('content');
  const map = { units: renderUnits, 'unit-detail': renderDetail, review: renderReview, stats: renderStats, settings: renderSettings };
  c.innerHTML = (map[S.screen] || renderUnits)();
  updateProgress();
}

function renderUnits() {
  const total = S.units.length;
  const done  = S.units.filter(u => u.done).length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  const PAGE  = 10;
  if (!S.unitPage) S.unitPage = 0;
  const start = S.unitPage * PAGE;
  const end   = Math.min(start + PAGE, total);
  const rows  = S.units.slice(start, end).map((u, idx) => {
    const i   = start + idx;
    const exN = (u.examples||[]).length;
    return `<div class="unit-card ${u.done?'done-card':''}" onclick="openUnit(${i})" oncontextmenu="showCtxMenu(event,${i})" ontouchstart="startLongPress(${i})" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()">
      <div class="chk ${u.done?'done':''}"></div>
      <div class="unit-info">
        <div class="unit-nm">Unit ${i+1} · ${esc(u.title)}</div>
        <div class="unit-meta">${u.done?'완료':'미시작'}${exN?' · 예문 '+exN+'개':''}</div>
      </div>
      <div class="unit-arr">›</div>
    </div>`;
  }).join('');
  const totalPages = Math.ceil(total / PAGE) || 1;
  const pageNav = totalPages > 1 ? `<div class="page-nav">
    <button class="page-btn" onclick="setUnitPage(${S.unitPage-1})" ${S.unitPage===0?'disabled':''}>‹ 이전</button>
    <span class="page-info">${S.unitPage+1} / ${totalPages}</span>
    <button class="page-btn" onclick="setUnitPage(${S.unitPage+1})" ${end>=total?'disabled':''}>다음 ›</button>
  </div>` : '';
  return `<div class="unit-list">${rows}</div>
  <div class="add-unit-row" onclick="addUnitModal()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="9" r="8" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
      <line x1="9" y1="5" x2="9" y2="13" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="5" y1="9" x2="13" y2="9" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    유닛 추가
  </div>
  ${pageNav}`;
}

function renderDetail() {
  const u = S.units[S.unit];
  const i = S.unit;
  const exHtml = (u.examples||[]).map((ex,ei)=>
    `<div class="ex-card">
      <span class="ex-del" onclick="delEx(${ei})">×</span>
      <div class="ex-en">${esc(ex.en)}</div>
      <div class="ex-kr">${esc(ex.kr)}</div>
    </div>`).join('');
  return `<div class="nb">
    <div class="unit-title-box">
      <div class="unit-title-no">Unit ${i+1}</div>
      <div class="unit-title-nm">${esc(u.title)}</div>
    </div>
    <div class="sec-lbl" style="padding-left:2px">핵심 포인트</div>
    <textarea class="grammar-ta" id="note-ta" placeholder="문법 핵심 내용을 입력하세요..." oninput="autoNote()">${esc(u.note||'')}</textarea>
    <div class="sec-lbl" style="padding-left:2px">예문</div>
    ${exHtml}
    <div class="ex-form" id="ex-form" style="display:none;flex-direction:column;gap:8px;background:var(--card);border:1px solid #2D2D2D;border-radius:8px;padding:12px 13px;margin-bottom:7px">
      <input class="ex-inp" id="ei-en" placeholder="영어 예문" />
      <input class="ex-inp" id="ei-kr" placeholder="한국어 해석" />
      <div class="ex-form-btns">
        <button class="btn-cancel" onclick="render()">취소</button>
        <button class="btn-save" onclick="saveEx()">저장</button>
      </div>
    </div>
    <div class="add-ex-btn" id="add-ex-btn" onclick="showExForm()">+ 예문 추가</div>
    <button class="done-cta ${u.done?'unmark':'mark'}" onclick="toggleDone()" style="margin-top:10px">${u.done?'✓ 완료됨 (탭하면 해제)':'이 유닛 완료로 표시'}</button>
  </div>`;
}

function renderReview() {
  const all = [];
  S.units.forEach((u,ui)=>(u.examples||[]).forEach((ex,ei)=>all.push({...ex,ui,ei,ut:u.title})));
  let list = S.rvFilter==='all' ? all : all.filter(e=>e.ui===parseInt(S.rvFilter));
  const chips = `<div class="filter-row">
    <div class="chip ${S.rvFilter==='all'?'on':''}" onclick="setFilter('all')">전체</div>
    ${S.units.map((u,i)=>`<div class="chip ${S.rvFilter==i?'on':''}" onclick="setFilter(${i})">Unit ${i+1}</div>`).join('')}
  </div>`;
  if (!list.length) return `<div class="rv-wrap">${chips}<div class="rv-empty">예문이 없어요.<br>유닛 노트에서 예문을 추가해보세요!</div></div>`;
  if (S.rvIdx >= list.length) S.rvIdx = 0;
  if (!S.rvRandomIdx || S.rvRandomIdx.length !== list.length) {
    S.rvRandomIdx = list.map((_,i)=>i).sort(()=>Math.random()-0.5);
    S.rvRandomPos = 0;
  }
  if (S.rvRandomPos >= S.rvRandomIdx.length) S.rvRandomPos = 0;
  const cur = list[S.rvRandomIdx[S.rvRandomPos]];
  const doneCnt  = list.filter(e=>S.rvMem[`${e.ui}-${e.ei}`]==='done').length;
  const againCnt = list.filter(e=>S.rvMem[`${e.ui}-${e.ei}`]==='again').length;
  return `<div class="rv-wrap">
    ${chips}
    <div class="rv-count">${list.length}개 중 ${S.rvIdx+1}번째</div>
    <div class="flash-card" onclick="toggleReveal()">
      <div class="flash-en">${esc(cur.en)}</div>
      ${S.rvRevealed?`<div class="flash-div"></div><div class="flash-kr">${esc(cur.kr)}</div>`:''}
      <div class="flash-hint">Unit ${cur.ui+1} · ${esc(cur.ut)}</div>
      ${!S.rvRevealed?'<div class="flash-tap">탭하면 해석 보기</div>':''}
    </div>
    <div class="rv-btns">
      <button class="rv-skip" onclick="markRv('again')">다음에 또 볼게</button>
      <button class="rv-ok"   onclick="markRv('done')">외웠어요</button>
    </div>
    <div style="height:1px;background:var(--g5)"></div>
    <div class="rv-stat-row">
      <div class="rv-stat"><div class="rv-stat-n" style="color:var(--orange-dk)">${doneCnt}</div><div class="rv-stat-l">외웠어요</div></div>
      <div class="rv-stat"><div class="rv-stat-n">${againCnt}</div><div class="rv-stat-l">다시볼게</div></div>
      <div class="rv-stat"><div class="rv-stat-n">${list.length-doneCnt-againCnt}</div><div class="rv-stat-l">미확인</div></div>
    </div>
  </div>`;
}

function renderStats() {
  const total = S.units.length, done = S.units.filter(u=>u.done).length;
  const exN = S.units.reduce((s,u)=>s+(u.examples||[]).length,0);
  const pct = total ? Math.round(done/total*100) : 0;
  return `<div class="st-wrap">
    <div class="st-grid">
      <div class="st-card"><div class="st-n accent">${done}</div><div class="st-l">완료 유닛</div></div>
      <div class="st-card"><div class="st-n">${total-done}</div><div class="st-l">남은 유닛</div></div>
      <div class="st-card"><div class="st-n">${exN}</div><div class="st-l">저장된 예문</div></div>
      <div class="st-card"><div class="st-n accent">${pct}%</div><div class="st-l">전체 진도</div></div>
    </div>
    <div class="st-prog-wrap">
      <div class="st-prog-lbl">전체 진도 · ${done} / ${total} units</div>
      <div class="st-prog-bar"><div class="st-prog-fill" style="width:${pct}%"></div></div>
    </div>
  </div>`;
}

function renderSettings() {
  const on = S.driveOn;
  return `<div class="sv-wrap">
    <div class="sv-sec-lbl">데이터 백업</div>
    <div class="sv-sec">
      <div class="sv-row" onclick="handleDrive()">
        <div class="sv-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2C5.69 2 3 4.69 3 8c0 .34.03.67.08 1H2a2 2 0 000 4h14a2 2 0 000-4h-1.08c.05-.33.08-.66.08-1 0-3.31-2.69-6-6-6z" stroke="#888780" stroke-width="1.2" fill="none"/></svg></div>
        <div class="sv-txt">
          <div class="sv-nm">Google Drive 연동</div>
          <div class="sv-desc">${on?'연결됨 · 저장 시 자동 동기화':'연결하면 데이터가 안전하게 저장됩니다'}</div>
        </div>
        <span class="badge ${on?'badge-on':'badge-off'}">${on?'연결됨':'미연결'}</span>
      </div>
      ${on?`<div class="sv-row" onclick="syncNow()">
        <div class="sv-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9a6 6 0 016-6 6 6 0 014.24 1.76L15 7" stroke="#888780" stroke-width="1.2" stroke-linecap="round"/><path d="M15 9a6 6 0 01-6 6 6 6 0 01-4.24-1.76L3 11" stroke="#888780" stroke-width="1.2" stroke-linecap="round"/><path d="M15 4v3h-3M3 14v-3h3" stroke="#888780" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="sv-txt"><div class="sv-nm">지금 동기화</div><div class="sv-desc">Drive에 데이터를 저장합니다</div></div>

        <div class="sv-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v8M6 8l3 3 3-3" stroke="#888780" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 13h10" stroke="#888780" stroke-width="1.2" stroke-linecap="round"/></svg></div>
        <div class="sv-txt"><div class="sv-nm">데이터 내보내기</div><div class="sv-desc">JSON 파일로 백업</div></div>
        <div class="sv-arr">›</div>
      </div>
      <div class="sv-row" onclick="document.getElementById('imp-inp').click()">
        <div class="sv-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 15V7M6 10l3-3 3 3" stroke="#888780" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 5h10" stroke="#888780" stroke-width="1.2" stroke-linecap="round"/></svg></div>
        <div class="sv-txt"><div class="sv-nm">데이터 가져오기</div><div class="sv-desc">JSON 파일에서 복원</div></div>
        <div class="sv-arr">›</div>

    <input type="file" id="imp-inp" accept=".json" style="display:none" onchange="importData(event)" />
  </div>`;
}

/* ── ACTIONS ── */
function autoNote() { S.units[S.unit].note = document.getElementById('note-ta').value; save(); }
function showExForm() {
  document.getElementById('ex-form').style.display = 'flex';
  document.getElementById('add-ex-btn').style.display = 'none';
  document.getElementById('ei-en').focus();
}
function saveEx() {
  const en = document.getElementById('ei-en').value.trim();
  const kr = document.getElementById('ei-kr').value.trim();
  if (!en) { toast('영어 예문을 입력해주세요'); return; }
  if (!S.units[S.unit].examples) S.units[S.unit].examples = [];
  S.units[S.unit].examples.push({ en, kr });
  save(); toast('예문이 저장되었어요'); render();
}
function delEx(i) { S.units[S.unit].examples.splice(i,1); save(); render(); }
function toggleDone() { S.units[S.unit].done = !S.units[S.unit].done; save(); render(); }
function setFilter(f) { S.rvFilter=f; S.rvIdx=0; S.rvRevealed=false; S.rvRandomIdx=null; S.rvRandomPos=0; render(); }
function toggleReveal() { S.rvRevealed=!S.rvRevealed; render(); }
function setUnitPage(p) {
  const total = S.units.length;
  const totalPages = Math.ceil(total / 10) || 1;
  if (p < 0 || p >= totalPages) return;
  S.unitPage = p;
  render();
}
function markRv(r) {
  const all = [];
  S.units.forEach((u,ui)=>(u.examples||[]).forEach((ex,ei)=>all.push({ui,ei})));
  let list = S.rvFilter==='all' ? all : all.filter(e=>e.ui===parseInt(S.rvFilter));
  if (!list.length) return;
  const cur = list[S.rvIdx];
  S.rvMem[`${cur.ui}-${cur.ei}`] = r;
  S.rvRevealed = false;
  S.rvRandomPos = ((S.rvRandomPos||0) + 1) % list.length;
  save(); render();
}
let _lpTimer = null;
function startLongPress(i) {
  _lpTimer = setTimeout(() => showCtxMenu(null, i), 600);
}
function cancelLongPress() {
  if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; }
}
function showCtxMenu(e, i) {
  if (e) e.preventDefault();
  cancelLongPress();
  const u = S.units[i];
  const bg = document.createElement('div');
  bg.className = 'ctx-menu'; bg.id = 'ctx-menu';
  bg.innerHTML = `<div class="ctx-sheet">
    <div class="ctx-title">Unit ${i+1} · ${u.title}</div>
    <button class="ctx-btn" onclick="editUnit(${i})">✏️ 유닛 이름 수정</button>
    <button class="ctx-btn danger" onclick="deleteUnit(${i})">🗑 유닛 삭제</button>
    <button class="ctx-cancel" onclick="closeCtx()">취소</button>
  </div>`;
  document.body.appendChild(bg);
}
function closeCtx() {
  const m = document.getElementById('ctx-menu'); if (m) m.remove();
}
function editUnit(i) {
  closeCtx();
  const u = S.units[i];
  const bg = document.createElement('div');
  bg.className = 'modal-bg'; bg.id = 'au-modal';
  bg.innerHTML = `<div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-ttl">유닛 이름 수정</div>
    <input class="modal-inp" id="au-inp" value="${u.title}" maxlength="60" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">취소</button>
      <button class="modal-ok" onclick="confirmEdit(${i})">저장</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
  setTimeout(() => { const el = document.getElementById('au-inp'); if(el){el.focus();el.select();} }, 120);
}
function confirmEdit(i) {
  const v = document.getElementById('au-inp').value.trim();
  if (!v) { toast('유닛 제목을 입력해주세요'); return; }
  S.units[i].title = v;
  save(); closeModal(); render(); toast('수정됐어요!');
}
function deleteUnit(i) {
  closeCtx();
  if (!confirm(`Unit ${i+1} · ${S.units[i].title}\n\n정말 삭제할까요? 복구할 수 없어요.`)) return;
  S.units.splice(i, 1);
  save(); render(); toast('삭제됐어요');
}
function addUnitModal() {
  const bg = document.createElement('div');
  bg.className = 'modal-bg'; bg.id = 'au-modal';
  bg.innerHTML = `<div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-ttl">유닛 추가</div>
    <input class="modal-inp" id="au-inp" placeholder="예: am / is / are" maxlength="60" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">취소</button>
      <button class="modal-ok" onclick="confirmAdd()">추가</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
  setTimeout(()=>document.getElementById('au-inp').focus(), 120);
}
function closeModal() { const m=document.getElementById('au-modal'); if(m) m.remove(); }
function confirmAdd() {
  const v = document.getElementById('au-inp').value.trim();
  if (!v) { toast('유닛 제목을 입력해주세요'); return; }
  S.units.push({ title:v, note:'', examples:[], done:false });
  save(); closeModal(); render(); toast('유닛이 추가되었어요');
}
function exportData() {
  const blob = new Blob([JSON.stringify({units:S.units,rvMem:S.rvMem},null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'grammar-note-backup.json'; a.click();
  toast('내보내기 완료!');
}
function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.units) { S.units=d.units; S.rvMem=d.rvMem||{}; save(); render(); toast('데이터를 가져왔어요!'); }
    } catch { toast('파일을 읽을 수 없어요'); }
  };
  r.readAsText(file);
}

/* ── GOOGLE DRIVE (GIS 방식) ── */
function initGapi() {
  gapi.load('client', () => {
    gapi.client.init({
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
    }).then(() => {
      S.gapiReady = true;
      // 저장된 토큰 복원 시도
      const saved = sessionStorage.getItem('gn-token');
      if (saved) {
        accessToken = saved;
        gapi.client.setToken({ access_token: accessToken });
        S.driveOn = true;
        loadFromDrive();
        if (S.screen === 'settings') render();
      }
    }).catch(() => {});
  });
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { toast('로그인이 취소됐어요'); return; }
      accessToken = resp.access_token;
      sessionStorage.setItem('gn-token', accessToken);
      gapi.client.setToken({ access_token: accessToken });
      S.driveOn = true;
      toast('Drive에 연결됐어요!');
      loadFromDrive();
      render();
    }
  });
}
function handleDrive() {
  if (!S.gapiReady) { toast('잠시 후 다시 시도해주세요'); return; }
  if (S.driveOn) {
    google.accounts.oauth2.revoke(accessToken, () => {});
    accessToken = null;
    sessionStorage.removeItem('gn-token');
    gapi.client.setToken(null);
    S.driveOn = false;
    toast('Drive 연결 해제됐어요');
    render();
  } else {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  }
}
function syncNow() { if (S.driveOn) saveToDrive(); }
function saveToDrive() {
  if (!S.driveOn || !accessToken) return;
  const body = JSON.stringify({units: S.units, rvMem: S.rvMem});
  if (S.driveFileId) {
    fetch('https://www.googleapis.com/upload/drive/v3/files/' + S.driveFileId + '?uploadType=media', {
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body
    }).then(() => toast('Drive에 저장됐어요!'));
  } else {
    const meta = JSON.stringify({ name: FILE_NAME, parents: ['appDataFolder'] });
    const boundary = 'grammar_note_boundary';
    const multipart = '--' + boundary + '\r\nContent-Type: application/json\r\n\r\n' + meta +
      '\r\n--' + boundary + '\r\nContent-Type: application/json\r\n\r\n' + body + '\r\n--' + boundary + '--';
    fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'multipart/related; boundary=' + boundary },
      body: multipart
    }).then(r => r.json()).then(d => {
      S.driveFileId = d.id; save(); toast('Drive에 저장됐어요!');
    });
  }
}
function loadFromDrive() {
  if (!S.driveOn || !accessToken) return;
  fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='" + FILE_NAME + "'&fields=files(id)", {
    headers: { 'Authorization': 'Bearer ' + accessToken }
  }).then(r => r.json()).then(d => {
    const files = d.files;
    if (files && files.length) {
      S.driveFileId = files[0].id; save();
      fetch('https://www.googleapis.com/drive/v3/files/' + S.driveFileId + '?alt=media', {
        headers: { 'Authorization': 'Bearer ' + accessToken }
      }).then(r => r.json()).then(data => {
        if (data.units) { S.units = data.units; S.rvMem = data.rvMem || {}; save(); render(); toast('Drive에서 불러왔어요!'); }
      }).catch(() => {});
    }
  }).catch(() => {});
}

function showOnboarding() {
  if (localStorage.getItem('gn-ob-done')) return;
  let step = 0;
  function render() {
    const existing = document.getElementById('ob-modal');
    if (existing) existing.remove();
    const s = OB_STEPS[step];
    const bg = document.createElement('div');
    bg.className = 'ob-bg'; bg.id = 'ob-modal';
    const dots = OB_STEPS.map((_,i) => `<div class="ob-dot ${i===step?'on':''}"></div>`).join('');
    bg.innerHTML = `<div class="ob-sheet">
      <div class="ob-icon">
        <svg width="40" height="40" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <rect x="60" y="148" width="148" height="118" rx="28" fill="rgba(255,255,255,0.92)"/>
          <text x="134" y="232" text-anchor="middle" font-size="82" font-weight="700" fill="#2D2D2D" font-family="Arial,sans-serif">A</text>
          <rect x="220" y="148" width="112" height="118" rx="28" fill="rgba(255,255,255,0.45)"/>
          <text x="276" y="232" text-anchor="middle" font-size="82" font-weight="700" fill="#ffffff" font-family="Arial,sans-serif">B</text>
          <rect x="344" y="148" width="108" height="118" rx="28" fill="rgba(255,255,255,0.18)"/>
          <text x="398" y="232" text-anchor="middle" font-size="82" font-weight="700" fill="rgba(255,255,255,0.5)" font-family="Arial,sans-serif">C</text>
          <rect x="60" y="290" width="248" height="90" rx="24" fill="#f0974a"/>
          <text x="184" y="348" text-anchor="middle" font-size="36" font-weight="700" fill="#ffffff" font-family="Arial,sans-serif">space</text>
          <rect x="322" y="290" width="64" height="90" rx="24" fill="rgba(255,255,255,0.18)"/>
          <rect x="398" y="290" width="54" height="90" rx="24" fill="rgba(255,255,255,0.18)"/>
        </svg>
      </div>
      <div class="ob-step">${step+1} / ${OB_STEPS.length}</div>
      <div class="ob-title">${s.title.replace(/\n/g,'<br>')}</div>
      <div class="ob-desc">${s.desc.replace(/\n/g,'<br>')}</div>
      <div class="ob-dots">${dots}</div>
      <button class="ob-btn" onclick="obNext()">${s.btn}</button>
    </div>`;
    document.body.appendChild(bg);
  }
  window.obNext = function() {
    step++;
    if (step >= OB_STEPS.length) {
      document.getElementById('ob-modal').remove();
      localStorage.setItem('gn-ob-done', '1');
    } else {
      render();
    }
  };
  render();
}
